<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d6efd">
  <meta name="description" content="Hydra Transportes Urgentes - Cálculo de fretes e corridas para motoristas autônomos">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/HydraLogo.png">
  <title>Hydra Transportes Urgentes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="loadingOverlay" class="loading-overlay d-none">
  <div class="spinner-border text-light" role="status" style="width:3rem;height:3rem">
    <span class="visually-hidden">Carregando...</span>
  </div>
</div>

<div id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="logo">
    <img id="sidebarLogo" src="assets/HydraLogo.png" alt="Hydra Transportes Urgentes" style="max-height:60px;margin-bottom:5px">
    <h5>Hydra Transportes Urgentes</h5>
  </div>
  <nav class="nav flex-column">
    <a class="nav-link" href="#" data-page="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a class="nav-link" href="#" data-page="corridas"><i class="bi bi-plus-circle"></i> Nova Corrida</a>
    <a class="nav-link" href="#" data-page="historico"><i class="bi bi-clock-history"></i> Histórico</a>
    <a class="nav-link" href="#" data-page="clientes"><i class="bi bi-people"></i> Clientes</a>
    <a class="nav-link" href="#" data-page="servicos"><i class="bi bi-grid"></i> Serviços</a>
    <a class="nav-link" href="#" data-page="config"><i class="bi bi-gear"></i> Configurações</a>
  </nav>
</aside>

<main class="main-content" id="mainContent">
  <nav class="navbar navbar-light bg-white rounded-3 shadow-sm mb-3 px-3 d-md-none">
    <button class="btn btn-outline-primary" id="menuToggle">
      <i class="bi bi-list"></i>
    </button>
    <span class="fw-bold">Hydra Transportes Urgentes</span>
    <div></div>
  </nav>
  <div id="pageContent"></div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
<script src="js/app.js"></script>
</body>
</html>
