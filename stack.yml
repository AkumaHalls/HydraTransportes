version: "3.8"

services:
  hydra-transportes:
    image: hydra-transportes-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydra-transportes-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
